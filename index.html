<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Taiwan Food Map AI</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div class="header">
  🍜 Taiwan Food Map AI版
  <br/><br/>

  <input id="searchBox" placeholder="搜尋：咖啡 / 火鍋 / 滷肉飯">
  <button onclick="searchFood()">搜尋</button>

  <br/><br/>

  <input id="aiBox" placeholder="💬 我想吃便宜宵夜 / 咖啡 / 火鍋">
  <button onclick="aiRecommend()">AI推薦</button>
</div>

<div id="map"></div>

<div id="list">
  <h3>🍽️ 附近餐廳</h3>
</div>

<div id="favorites">
  <h3>❤️ 我的收藏</h3>
</div>

<script src="app.js"></script>

</body>
</html>
